# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: .node-version
        cache: 'npm'
    - run: npm ci
    - run: npm run lint

  test-unit:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: .node-version
        cache: 'npm'
    - run: npm ci
    - run: env > .env.test
    - run: npm run test:unit

  test-integration-and-e2e:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5433/livraria
    services:
      postgres:
        image: postgres:16
        ports:
          - 5433:5432
        env:
          POSTGRES_DB: livraria
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: .node-version
        cache: 'npm'
    - run: npm ci
    - run: env > .env.test
    - name: Inicializa o banco de dados
      env:
        PGPASSWORD: postgres
      run: |
        psql -h localhost -U postgres -d livraria -f docker/init/01-create-tables.sql
        psql -h localhost -U postgres -f docker/init/02-create-test-db.sql
    - run: npm run test:int
    - run: npm run test:e2e
